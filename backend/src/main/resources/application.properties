spring.application.name=educloud-backend
server.port=${PORT:8080}
server.address=0.0.0.0

# Database Configuration - Railway MySQL
spring.datasource.url=jdbc:${MYSQL_URL:mysql://localhost:3306/educloud_db}?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration
app.jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
app.jwt.expirationMs=86400000

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# HikariCP - Allow app to start even if DB not ready yet
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.keepalive-time=60000

# CORS
app.cors.allowedOrigins=*
