<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance - EduCloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar glass">
            <h2 class="logo">EduCloud</h2>
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="nav-item">Dashboard</a>
                <a href="students.html" class="nav-item">Students</a>
                <a href="faculty.html" class="nav-item">Faculty</a>
                <a href="attendance.html" class="nav-item active">Attendance</a>
                <a href="#" class="nav-item">Marks</a>
                <a href="#" class="nav-item">Settings</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="topbar">
                <h2>Mark Attendance</h2>
                <div class="user-profile">
                    <span id="userNameDisplay">Faculty</span>
                    <a href="#" id="logoutBtn" class="btn" style="margin-left: 1rem;">Logout</a>
                </div>
            </div>

            <div class="glass" style="padding: 2rem; border-radius: 16px;">
                <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                    <select id="subjectSelect" class="form-group" style="padding: 0.8rem; border-radius: 8px; border: 1px solid var(--glass-border);">
                        <option value="1">Data Structures (CS301)</option>
                    </select>
                    <input type="date" id="attendanceDate" class="form-group" style="padding: 0.8rem; border-radius: 8px; border: 1px solid var(--glass-border);">
                </div>

                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceList">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
                <button id="saveAttendanceBtn" class="btn btn-primary" style="margin-top: 2rem; width: 200px;">Save Attendance</button>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const attendanceList = document.getElementById('attendanceList');
            const saveBtn = document.getElementById('saveAttendanceBtn');
            const dateInput = document.getElementById('attendanceDate');
            dateInput.valueAsDate = new Date();

            let students = [];

            async function loadStudents() {
                try {
                    students = await apiCall('/students');
                    attendanceList.innerHTML = '';
                    students.forEach(s => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="padding: 1rem; border-bottom: 1px solid var(--glass-border);">${s.studentId}</td>
                            <td style="padding: 1rem; border-bottom: 1px solid var(--glass-border);">${s.name}</td>
                            <td style="padding: 1rem; border-bottom: 1px solid var(--glass-border);">
                                <select class="status-select" data-id="${s.id}" style="padding: 0.5rem; border-radius: 6px; border: 1px solid var(--glass-border);">
                                    <option value="PRESENT">Present</option>
                                    <option value="ABSENT">Absent</option>
                                </select>
                            </td>
                        `;
                        attendanceList.appendChild(tr);
                    });
                } catch (e) { console.error(e); }
            }

            saveBtn.onclick = async () => {
                const selects = document.querySelectorAll('.status-select');
                const subjectId = document.getElementById('subjectSelect').value;
                const date = dateInput.value;
                
                try {
                    for (const select of selects) {
                        await apiCall('/attendance/mark', 'POST', {
                            studentId: select.getAttribute('data-id'),
                            subjectId: subjectId,
                            date: date,
                            status: select.value
                        });
                    }
                    alert('Attendance marked successfully!');
                } catch (e) { alert('Failed to mark attendance'); }
            };

            loadStudents();
        });
    </script>
</body>
</html>
