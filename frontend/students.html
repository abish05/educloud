<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management - EduCloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .table-container {
            margin-top: 2rem;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }
        th {
            color: var(--text-light);
            font-weight: 600;
        }
        .action-btns {
            display: flex;
            gap: 0.5rem;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: var(--bg);
            margin: 5% auto;
            padding: 2rem;
            border-radius: 16px;
            width: 500px;
            box-shadow: var(--glass-shadow);
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <h2 class="logo">EduCloud</h2>
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="nav-item">Dashboard</a>
                <a href="students.html" class="nav-item active">Students</a>
                <a href="#" class="nav-item">Attendance</a>
                <a href="#" class="nav-item">Marks</a>
                <a href="#" class="nav-item">Settings</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="topbar">
                <h2>Student Management</h2>
                <div class="user-profile">
                    <button id="addStudentBtn" class="btn btn-primary">Add New Student</button>
                    <a href="#" id="logoutBtn" class="btn" style="margin-left: 1rem;">Logout</a>
                </div>
            </div>

            <div class="table-container glass" style="padding: 1.5rem; border-radius: 16px;">
                <table id="studentsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Reg Number</th>
                            <th>Department</th>
                            <th>Email</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentList">
                        <!-- Data will be populated here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add Student Modal -->
    <div id="studentModal" class="modal">
        <div class="modal-content glass">
            <h3 id="modalTitle">Add New Student</h3>
            <form id="studentForm" style="margin-top: 1.5rem;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Student ID (Custom)</label>
                    <input type="text" id="studentId" required>
                </div>
                <div class="form-group">
                    <label>Register Number</label>
                    <input type="text" id="registerNumber" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Year</label>
                    <input type="number" id="year" value="1" required>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary w-100">Save Student</button>
                    <button type="button" id="closeModal" class="btn w-100" style="background: #e2e8f0;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/students.js"></script>
</body>
</html>
