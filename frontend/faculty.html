<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Management - EduCloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .table-container { margin-top: 2rem; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid var(--glass-border); }
        th { color: var(--text-light); font-weight: 600; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .modal-content { background-color: var(--bg); margin: 5% auto; padding: 2rem; border-radius: 16px; width: 450px; box-shadow: var(--glass-shadow); }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar glass">
            <h2 class="logo">EduCloud</h2>
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="nav-item">Dashboard</a>
                <a href="students.html" class="nav-item">Students</a>
                <a href="faculty.html" class="nav-item active">Faculty</a>
                <a href="#" class="nav-item">Attendance</a>
                <a href="#" class="nav-item">Marks</a>
                <a href="#" class="nav-item">Settings</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="topbar">
                <h2>Faculty Management</h2>
                <div class="user-profile">
                    <button id="addFacultyBtn" class="btn btn-primary">Add Faculty Member</button>
                    <a href="#" id="logoutBtn" class="btn" style="margin-left: 1rem;">Logout</a>
                </div>
            </div>

            <div class="table-container glass" style="padding: 1.5rem; border-radius: 16px;">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="facultyList">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="facultyModal" class="modal">
        <div class="modal-content glass">
            <h3>Add Faculty Member</h3>
            <form id="facultyForm" style="margin-top: 1.5rem;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Temporary Password</label>
                    <input type="password" id="password" required>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary w-100">Create Account</button>
                    <button type="button" id="closeModal" class="btn w-100">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const facultyList = document.getElementById('facultyList');
            const facultyModal = document.getElementById('facultyModal');
            const addFacultyBtn = document.getElementById('addFacultyBtn');
            const closeModal = document.getElementById('closeModal');
            const facultyForm = document.getElementById('facultyForm');

            async function loadFaculty() {
                try {
                    const faculty = await apiCall('/users/faculty');
                    facultyList.innerHTML = '';
                    faculty.forEach(f => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${f.name}</td>
                            <td>${f.email}</td>
                            <td><span class="status-pill active">Active</span></td>
                            <td><button class="btn btn-danger btn-sm" onclick="deleteFaculty(${f.id})">Delete</button></td>
                        `;
                        facultyList.appendChild(tr);
                    });
                } catch (e) { console.error(e); }
            }

            facultyForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const data = {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                };
                try {
                    await apiCall('/users/faculty', 'POST', data);
                    facultyModal.style.display = 'none';
                    loadFaculty();
                } catch (e) { alert('Failed to create faculty'); }
            });

            addFacultyBtn.onclick = () => facultyModal.style.display = 'block';
            closeModal.onclick = () => facultyModal.style.display = 'none';
            
            window.deleteFaculty = async (id) => {
                if(confirm('Delete this faculty member?')) {
                    await apiCall(`/users/${id}`, 'DELETE');
                    loadFaculty();
                }
            };

            loadFaculty();
        });
    </script>
</body>
</html>
