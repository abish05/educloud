<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCloud – Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #8b5cf6;
            --bg: #0f172a;
            --card: rgba(30,41,59,0.8);
            --text: #f1f5f9;
            --muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body {
            min-height: 100vh;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.15) 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.15) 0%, transparent 60%);
        }
        .login-wrap {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .brand { text-align: center; margin-bottom: 2rem; }
        .brand h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg,#6366f1,#8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .brand p { color: var(--muted); margin-top: 0.4rem; font-size: 0.95rem; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 4px; }
        .tab { flex: 1; padding: 0.6rem; text-align: center; border-radius: 8px; cursor: pointer; color: var(--muted); font-weight: 500; font-size: 0.9rem; transition: all 0.2s; }
        .tab.active { background: var(--primary); color: white; }
        label { display: block; color: var(--muted); font-size: 0.85rem; margin-bottom: 0.4rem; margin-top: 1.2rem; font-weight: 500; }
        input { width: 100%; padding: 0.85rem 1rem; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: var(--primary); }
        .btn-login { width: 100%; padding: 0.9rem; background: linear-gradient(135deg,#6366f1,#8b5cf6); border: none; border-radius: 10px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 1.5rem; transition: opacity 0.2s; }
        .btn-login:hover { opacity: 0.9; }
        #msg { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
        .err { color: #f87171; }
        .hint { background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.3); border-radius: 10px; padding: 1rem; margin-top: 1.5rem; font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
        .hint strong { color: var(--primary); }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="brand">
        <h1>EduCloud</h1>
        <p>College Management System 2026</p>
    </div>
    <div class="tabs">
        <div class="tab active" onclick="setRole('ADMIN',this)">Admin</div>
        <div class="tab" onclick="setRole('FACULTY',this)">Faculty</div>
    </div>
    <form id="loginForm">
        <label>Email Address</label>
        <input type="email" id="email" value="admin@educloud.com" required>
        <label>Password</label>
        <input type="password" id="password" value="Admin123" required>
        <button type="submit" class="btn-login">Login to EduCloud</button>
    </form>
    <div id="msg"></div>
    <div class="hint">
        <strong>Admin:</strong> admin@educloud.com / Admin123<br>
        <strong>Faculty:</strong> faculty@educloud.com / Faculty123
    </div>
</div>
<script src="js/db.js"></script>
<script>
    const USERS = {
        'admin@educloud.com':   { password: 'Admin123',   role: 'ROLE_ADMIN',   name: 'System Admin' },
        'faculty@educloud.com': { password: 'Faculty123', role: 'ROLE_FACULTY', name: 'Faculty Member' },
    };
    let selectedRole = 'ADMIN';

    function setRole(role, el) {
        selectedRole = role;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        if (role === 'ADMIN') {
            document.getElementById('email').value = 'admin@educloud.com';
            document.getElementById('password').value = 'Admin123';
        } else {
            document.getElementById('email').value = 'faculty@educloud.com';
            document.getElementById('password').value = 'Faculty123';
        }
    }

    // Also allow custom faculty accounts
    function loadCustomUsers() {
        const faculty = DB.getFaculty();
        faculty.forEach(f => {
            USERS[f.email] = { password: f.password || 'Faculty123', role: 'ROLE_FACULTY', name: f.name };
        });
    }

    const API_BASE = 'http://localhost:8080/api';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const msg = document.getElementById('msg');
        
        msg.innerHTML = '<span style="color:var(--primary)">Authenticating...</span>';

        try {
            const response = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('token', data.token);
                localStorage.setItem('userEmail', data.email);
                localStorage.setItem('userName', data.name);
                localStorage.setItem('userRole', data.role);
                window.location.href = 'admin-dashboard.html';
            } else {
                const errText = await response.text();
                msg.innerHTML = `<span class="err">${errText || 'Invalid email or password'}</span>`;
            }
        } catch (error) {
            console.error('Login error:', error);
            msg.innerHTML = '<span class="err">Server connection failed. Is the backend running?</span>';
        }
    });
</script>
</body>
</html>
