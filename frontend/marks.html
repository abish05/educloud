<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Marks - EduCloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar glass">
            <h2 class="logo">EduCloud</h2>
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="nav-item">Dashboard</a>
                <a href="students.html" class="nav-item">Students</a>
                <a href="faculty.html" class="nav-item">Faculty</a>
                <a href="attendance.html" class="nav-item">Attendance</a>
                <a href="marks.html" class="nav-item active">Marks</a>
                <a href="settings.html" class="nav-item">Settings</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="topbar">
                <h2>Internal Marks Management</h2>
                <div class="user-profile">
                    <span id="userNameDisplay">Admin</span>
                    <a href="#" id="logoutBtn" class="btn" style="margin-left: 1rem;">Logout</a>
                </div>
            </div>

            <div class="glass" style="padding: 2rem; border-radius: 16px;">
                <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                    <select id="subjectSelect" style="padding: 0.8rem; border-radius: 8px; border: 1px solid var(--glass-border);">
                        <option value="1">Data Structures (CS301)</option>
                    </select>
                    <select id="semesterSelect" style="padding: 0.8rem; border-radius: 8px; border: 1px solid var(--glass-border);">
                        <option value="1">Semester 1</option>
                        <option value="2">Semester 2</option>
                        <option value="3">Semester 3</option>
                    </select>
                </div>

                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Internal (25)</th>
                            <th>Semester (75)</th>
                        </tr>
                    </thead>
                    <tbody id="marksList">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
                <button id="saveMarksBtn" class="btn btn-primary" style="margin-top: 2rem; width: 200px;">Save Marks</button>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const marksList = document.getElementById('marksList');
            const saveBtn = document.getElementById('saveMarksBtn');

            async function loadStudents() {
                try {
                    const students = await apiCall('/students');
                    marksList.innerHTML = '';
                    students.forEach(s => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="padding: 1rem; border-bottom: 1px solid var(--glass-border);">${s.studentId}</td>
                            <td style="padding: 1rem; border-bottom: 1px solid var(--glass-border);">${s.name}</td>
                            <td style="padding: 1rem; border-bottom: 1px solid var(--glass-border);">
                                <input type="number" class="internal-input" data-id="${s.id}" value="0" max="25" style="width: 60px; padding: 0.4rem;">
                            </td>
                            <td style="padding: 1rem; border-bottom: 1px solid var(--glass-border);">
                                <input type="number" class="semester-input" data-id="${s.id}" value="0" max="75" style="width: 60px; padding: 0.4rem;">
                            </td>
                        `;
                        marksList.appendChild(tr);
                    });
                } catch (e) { console.error(e); }
            }

            saveBtn.onclick = async () => {
                const rows = document.querySelectorAll('#marksList tr');
                const subjectId = document.getElementById('subjectSelect').value;
                const semester = document.getElementById('semesterSelect').value;
                
                try {
                    for (const row of rows) {
                        const studentId = row.querySelector('.internal-input').getAttribute('data-id');
                        const internal = row.querySelector('.internal-input').value;
                        const semesterMarks = row.querySelector('.semester-input').value;
                        
                        await apiCall('/marks', 'POST', {
                            studentId: studentId,
                            subjectId: subjectId,
                            semester: semester,
                            internalMarks: internal,
                            semesterMarks: semesterMarks,
                            gpa: (parseFloat(internal) + parseFloat(semesterMarks)) / 10
                        });
                    }
                    alert('Marks saved successfully!');
                } catch (e) { alert('Failed to save marks'); }
            };

            loadStudents();
        });
    </script>
</body>
</html>
